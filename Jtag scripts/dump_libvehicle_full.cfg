proc try_dump {filename addr} {
    if {[catch {dump_image $filename $addr 0x1000} err]} {
        echo "SKIP $filename @ [format 0x%08X $addr]"
    } else {
        echo "OK   $filename @ [format 0x%08X $addr]"
    }
}

