# Dump ap-app and libvehicle.so from RAM page by page
# Run in OpenOCD AFTER device has fully booted (USB is up)
# Then halt and run this script

proc try_dump_page {addr} {
    set tmp "/tmp/page.bin"
    if {[catch {dump_image $tmp $addr 0x1000} err]} {
        return ""
    }
    return $tmp
}

proc dump_range_safe {outfile start size} {
    set page 0x1000
    set addr $start
    set end [expr {$start + $size}]
    set good 0
    set bad 0
    set total [expr {$size / $page}]
    
    echo "Dumping $outfile: [format 0x%08X $start] to [format 0x%08X $end]"
    
    # Remove existing file
    catch {file delete $outfile}
    
    set pgnum 0
    while {$addr < $end} {
        set tmp "${outfile}.page"
        if {[catch {dump_image $tmp $addr $page} err]} {
            # Write zero page as placeholder
            set zf [open $tmp wb]
            puts -nonewline $zf [string repeat "\x00" $page]
            close $zf
            incr bad
        } else {
            incr good
        }
        
        # Append page to output
        set inf [open $tmp rb]
        fconfigure $inf -translation binary
        set data [read $inf]
        close $inf
        
        set outf [open $outfile ab]
        fconfigure $outf -translation binary
        puts -nonewline $outf $data
        close $outf
        
        catch {file delete $tmp}
        set addr [expr {$addr + $page}]
        incr pgnum
        
        if {$pgnum % 8 == 0} {
            echo "  [format %3d $pgnum]/[format %3d $total] pages  good=$good bad=$bad"
        }
    }
    echo "DONE: $outfile  good=$good bad=$bad  size=[file size $outfile]"
}

halt

# ap-app: loaded at 0x00010000, size ~0xAA000 (680KB)
dump_range_safe "ap_app_dump.bin" 0x00010000 0xAA000

# libvehicle.so: loaded at 0x4055B000, size ~0x2A000 (168KB)  
dump_range_safe "libvehicle_dump.bin" 0x4055B000 0x2A000

echo "=== ALL DONE ==="
