halt

echo "=== Scanning for DeviceSettings struct in RAM ==="
echo "Pattern: word 0x00000016 followed by 0x69726573 (seri)"
echo ""

# Scan userspace RAM 0x40000000 to 0x48000000
# mem2array varname width addr count
# Search in 64KB chunks (16384 words per chunk)

set found_list {}
set base 0x40000000
set chunk_words 16384
set chunk_bytes [expr {$chunk_words * 4}]
set end_addr 0x48000000

set addr $base
set iterations 0

while {$addr < $end_addr} {
    catch {
        mem2array chunk 32 $addr $chunk_words
        set i 0
        while {$i < [expr {$chunk_words - 1}]} {
            if {$chunk($i) == 0x00000016} {
                set next $chunk([expr {$i + 1}])
                # 'seri' in LE = 0x69726573
                if {$next == 0x69726573} {
                    set hit_addr [expr {$addr + ($i * 4)}]
                    echo [format "*** MATCH at 0x%08X ***" $hit_addr]
                    mdw $hit_addr 12
                    lappend found_list $hit_addr
                }
            }
            incr i
        }
    }
    set addr [expr {$addr + $chunk_bytes}]
    incr iterations
    if {[expr {$iterations % 8}] == 0} {
        echo [format "  Scanned to 0x%08X..." $addr]
    }
}

echo ""
echo "=== Scan complete ==="
if {[llength $found_list] == 0} {
    echo "No matches found"
} else {
    echo [format "Found %d match(es):" [llength $found_list]]
    foreach hit $found_list {
        echo [format "  0x%08X" $hit]
        mdw $hit 16
        echo ""
    }
}

resume
