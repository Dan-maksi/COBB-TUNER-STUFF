# Set hardware breakpoint at known ap-app userspace address
# Then scan for DeviceSettings when we catch it there

# First resume if halted
resume

echo "Setting breakpoint at 0x40b1b174 (ap-app userspace)..."
bp 0x40b1b174 4 hw

echo "Waiting for ap-app to hit breakpoint..."
echo "(This may take a moment - ap-app needs to execute that code path)"
echo ""
echo "When you see 'target halted... User mode' run:"
echo "  rbp 0x40b1b174"
echo "  source scan_userspace2.cfg"
