# Correct heap range scan - all pointers are in 0x43xxxxxx
# Search for SUBA_US_STI and "Installed" string

echo "=== Scanning 0x43000000-0x44000000 for key strings ==="
echo ""

set found_list {}
set addr 0x43000000
set end_addr 0x44000000
set chunk_words 1024

while {$addr < $end_addr} {
    catch {
        mem2array chunk 32 $addr $chunk_words
        set i 0
        while {$i < [expr {$chunk_words - 2}]} {

            # "SUBA" = 0x41425553
            if {$chunk($i) == 0x41425553} {
                set next $chunk([expr {$i + 1}])
                if {$next == 0x5F53555F} {
                    set hit [expr {$addr + ($i * 4)}]
                    echo [format "*** SUBA_US_ at 0x%08X ***" $hit]
                    mdw [expr {$hit - 64}] 48
                    echo "---"
                    lappend found_list [list SUBA $hit]
                }
            }

            # "Inst" = 0x74736E49, "alle" = 0x656C6C61
            if {$chunk($i) == 0x74736E49} {
                set next $chunk([expr {$i + 1}])
                if {$next == 0x656C6C61} {
                    set hit [expr {$addr + ($i * 4)}]
                    echo [format "*** Installed at 0x%08X ***" $hit]
                    mdw [expr {$hit - 64}] 48
                    echo "---"
                    lappend found_list [list Installed $hit]
                }
            }

            # "ecu_" = 0x5F756365
            if {$chunk($i) == 0x5F756365} {
                set next $chunk([expr {$i + 1}])
                # "inst" = 0x74736E69
                if {$next == 0x74736E69} {
                    set hit [expr {$addr + ($i * 4)}]
                    echo [format "*** ecu_inst at 0x%08X ***" $hit]
                    mdw [expr {$hit - 32}] 32
                    echo "---"
                    lappend found_list [list ecu_inst $hit]
                }
            }

            incr i
        }
    }
    set addr [expr {$addr + ($chunk_words * 4)}]
}

echo ""
echo [format "=== Done. Found %d match(es) ===" [llength $found_list]]
foreach hit $found_list {
    echo "  $hit"
}

resume
