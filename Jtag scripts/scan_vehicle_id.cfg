# Scan for "SUBA_US_STI_13" as raw ASCII in ap-app heap
# "SUBA" in LE = 0x41425553
# "_US_" in LE = 0x5F53555F
# Must halt in User mode first: halt; bp 0x40b1b174 4 hw; resume
# Then run this when breakpoint hits

rbp 0x40b1b174

echo "=== Scanning for SUBA_US_STI_13 string ==="
echo "Pattern: 0x41425553 (SUBA) + 0x5F53555F (_US_)"
echo ""

set found_list {}
set addr 0x40000000
set end_addr 0x44000000
set chunk_words 1024

while {$addr < $end_addr} {
    catch {
        mem2array chunk 32 $addr $chunk_words
        set i 0
        while {$i < [expr {$chunk_words - 1}]} {
            if {$chunk($i) == 0x41425553} {
                set next $chunk([expr {$i + 1}])
                if {$next == 0x5F53555F} {
                    set hit [expr {$addr + ($i * 4)}]
                    echo [format "*** MATCH at 0x%08X ***" $hit]
                    # Dump 128 bytes before and after for context
                    set ctx_start [expr {$hit - 128}]
                    mdw $ctx_start 64
                    echo "---"
                    lappend found_list $hit
                }
            }
            incr i
        }
    }
    set addr [expr {$addr + ($chunk_words * 4)}]
}

echo ""
echo [format "=== Done. Found %d match(es) ===" [llength $found_list]]
foreach hit $found_list {
    echo [format "  0x%08X" $hit]
}

resume
