# Run this after breakpoint hits in User mode
# rbp 0x40b1b174   <- remove breakpoint first

rbp 0x40b1b174

echo "=== Scanning ap-app userspace for DeviceSettings ==="
echo "Pattern: 0x00000016 + 0x69726573 (Boost archive header)"
echo ""

set found_list {}
set addr 0x40000000
set end_addr 0x44000000
set chunk_words 1024
set scanned 0

while {$addr < $end_addr} {
    catch {
        mem2array chunk 32 $addr $chunk_words
        set i 0
        while {$i < [expr {$chunk_words - 1}]} {
            if {$chunk($i) == 0x00000016} {
                set next $chunk([expr {$i + 1}])
                if {$next == 0x69726573} {
                    set hit [expr {$addr + ($i * 4)}]
                    echo [format "*** MATCH at 0x%08X ***" $hit]
                    mdw $hit 32
                    echo ""
                    lappend found_list $hit
                }
            }
            incr i
        }
        incr scanned
    }
    set addr [expr {$addr + ($chunk_words * 4)}]
}

echo [format "=== Scan complete. Checked %d pages, found %d match(es) ===" $scanned [llength $found_list]]
foreach hit $found_list {
    echo [format "  0x%08X" $hit]
}

resume
