halt

# Check if we're in userspace (User mode = cpsr & 0x1F == 0x10)
set cpsr [expr [lindex [ocd_reg cpsr] end]]
set mode [expr {$cpsr & 0x1F}]
echo [format "CPSR: 0x%08X  Mode: 0x%02X  (%s)" $cpsr $mode [expr {$mode == 0x10 ? "USER - good!" : "NOT USER - results may vary"}]]
echo [format "PC: 0x%08X" [lindex [ocd_reg pc] end]]
echo ""

# Scan ap-app heap/BSS for Boost header pattern
# Pattern: 0x00000016 (LE) then 0x69726573 ('seri')
# ap-app likely maps in 0x40000000-0x44000000 range
# Scan in 4KB chunks, catch data aborts at unmapped pages

echo "=== Scanning ap-app userspace for DeviceSettings ==="
set found_list {}
set addr 0x40000000
set end_addr 0x44000000
set chunk_words 1024

while {$addr < $end_addr} {
    catch {
        mem2array chunk 32 $addr $chunk_words
        set i 0
        while {$i < [expr {$chunk_words - 1}]} {
            if {$chunk($i) == 0x00000016} {
                set next $chunk([expr {$i + 1}])
                if {$next == 0x69726573} {
                    set hit [expr {$addr + ($i * 4)}]
                    echo [format "*** MATCH at 0x%08X ***" $hit]
                    mdw $hit 32
                    lappend found_list $hit
                }
            }
            incr i
        }
    }
    set addr [expr {$addr + ($chunk_words * 4)}]
}

echo ""
echo [format "=== Done. %d match(es) ===" [llength $found_list]]
foreach hit $found_list {
    echo [format "  0x%08X" $hit]
}

resume
